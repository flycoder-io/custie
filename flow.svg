<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 120" width="840" height="120" fill="none">
  <defs>
    <marker id="head" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#656d76" />
    </marker>
  </defs>

  <!-- Box 1: Slack -->
  <rect x="16" y="20" width="160" height="72" rx="10" ry="10" fill="#f6f0fe" stroke="#a475d6" stroke-width="1.5" />
  <text x="96" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#24292f" text-anchor="middle" dominant-baseline="central">@custie in Slack</text>
  <text x="96" y="70" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#656d76" text-anchor="middle" dominant-baseline="central">mention or DM</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="56" x2="222" y2="56" stroke="#656d76" stroke-width="1.5" marker-end="url(#head)" />

  <!-- Box 2: Custie server -->
  <rect x="226" y="20" width="160" height="72" rx="10" ry="10" fill="#eef6ff" stroke="#5b9bf8" stroke-width="1.5" />
  <text x="306" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#24292f" text-anchor="middle" dominant-baseline="central">Custie Server</text>
  <text x="306" y="70" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#656d76" text-anchor="middle" dominant-baseline="central">Socket Mode</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="56" x2="432" y2="56" stroke="#656d76" stroke-width="1.5" marker-end="url(#head)" />

  <!-- Box 3: Claude Code CLI -->
  <rect x="436" y="20" width="160" height="72" rx="10" ry="10" fill="#fff8e6" stroke="#d4a72c" stroke-width="1.5" />
  <text x="516" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#24292f" text-anchor="middle" dominant-baseline="central">Claude Code CLI</text>
  <text x="516" y="70" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#656d76" text-anchor="middle" dominant-baseline="central">claude -p</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="56" x2="642" y2="56" stroke="#656d76" stroke-width="1.5" marker-end="url(#head)" />

  <!-- Box 4: Codebase -->
  <rect x="646" y="20" width="170" height="72" rx="10" ry="10" fill="#e6faed" stroke="#3fba6b" stroke-width="1.5" />
  <text x="731" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#24292f" text-anchor="middle" dominant-baseline="central">Your Codebase</text>
  <text x="731" y="70" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#656d76" text-anchor="middle" dominant-baseline="central">read · edit · run</text>
</svg>
